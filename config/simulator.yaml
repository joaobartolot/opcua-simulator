server:
  endpoint: opc.tcp://0.0.0.0:4840
  namespace_uri: urn:opcua-simulator
  object_name: Simulator

node_id_template: ns=2;s={name}

runtime:
  update_interval_ms: 1000

variables:
  - name: pump
    data_type: boolean
    default: false
    writable: true

  - name: tank_1_valve
    data_type: boolean
    default: false
    writable: true

  - name: tank_1_flow
    data_type: float
    default: 0.0
    unit: liters_per_minute
    writable: true

  - name: tank_2_valve
    data_type: boolean
    default: false
    writable: true

  - name: tank_2_flow
    data_type: float
    default: 0.0
    unit: liters_per_minute
    writable: true

  - name: tank_3_valve
    data_type: boolean
    default: false
    writable: true

  - name: tank_3_flow
    data_type: float
    default: 0.0
    unit: liters_per_minute
    writable: true
